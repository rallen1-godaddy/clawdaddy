<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 11px;
      background: #2c2c2c;
      color: #fff;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      gap: 4px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.connected { background: #22c55e; }
    .dot.error { background: #ef4444; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .title { font-weight: 600; font-size: 12px; }
    #status { color: #aaa; }
    .hint { font-size: 9px; color: #666; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="title">🦞 ClawDaddy</div>
  <div class="row">
    <div id="dot" class="dot connecting"></div>
    <span id="status">Connecting...</span>
  </div>
  <div class="hint">Keep this window open</div>

  <script>
    const PORT = 3456;
    let ws = null;
    let reconnectTimer = null;
    let keepaliveTimer = null;
    const statusEl = document.getElementById('status');
    const dotEl = document.getElementById('dot');

    function setStatus(text, state) {
      statusEl.textContent = text;
      dotEl.className = 'dot ' + state;
    }

    function connect() {
      if (ws && ws.readyState === WebSocket.OPEN) return;

      setStatus('Connecting...', 'connecting');

      const url = `ws://127.0.0.1:${PORT}/plugin`;
      ws = new WebSocket(url);

      ws.onopen = () => {
        setStatus('Connected', 'connected');
        parent.postMessage({ pluginMessage: { type: 'connected' } }, '*');

        // Send hello
        ws.send(JSON.stringify({ type: 'hello', mode: 'plugin', version: '1.0.0', name: 'ClawDaddy' }));

        // Start keepalive (ping every 10s)
        startKeepalive();
      };

      ws.onmessage = handleMessage;

      ws.onclose = handleClose;

      ws.onerror = handleClose;
    }

    function handleMessage(event) {
      try {
        const msg = JSON.parse(event.data);

        if (msg.action === 'eval') {
          parent.postMessage({
            pluginMessage: { type: 'eval', id: msg.id, code: msg.code }
          }, '*');
        }

        // Daemon pings us
        if (msg.action === 'ping') {
          ws.send(JSON.stringify({ type: 'pong', id: msg.id }));
        }

        // Daemon responds to our ping
        if (msg.type === 'pong') {
          lastPong = Date.now();
        }
      } catch (e) {
        console.error('Message parse error:', e);
      }
    }

    function handleClose() {
      // Only show reconnecting if we were the active connection
      if (ws && ws.readyState !== WebSocket.OPEN) {
        ws = null;
        setStatus('Reconnecting...', 'connecting');
        stopKeepalive();
        parent.postMessage({ pluginMessage: { type: 'disconnected' } }, '*');

        // Fast reconnect (200ms)
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 200);
      }
    }

    let lastPong = Date.now();

    function startKeepalive() {
      stopKeepalive();
      lastPong = Date.now();
      keepaliveTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          // Check if we got a pong recently (within 8s for faster detection)
          if (Date.now() - lastPong > 8000) {
            console.log('[ClawDaddy] No pong received, reconnecting...');
            ws.close();
            return;
          }
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 3000);  // Ping every 3s for faster dead connection detection
    }

    function stopKeepalive() {
      if (keepaliveTimer) {
        clearInterval(keepaliveTimer);
        keepaliveTimer = null;
      }
    }

    // Connection function defined above

    // Receive results from plugin main thread
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'result') {
        // Send result back to CLI via WebSocket
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'result',
            id: msg.id,
            result: msg.result,
            error: msg.error
          }));
        }
      }

    };

    // Start connection
    connect();
  </script>
</body>
</html>
